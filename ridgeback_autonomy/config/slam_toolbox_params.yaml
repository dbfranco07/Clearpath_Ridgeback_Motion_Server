# SLAM Toolbox Parameters — Online Async mode
# Tuned for Hokuyo UST-10LX (270° FOV, 25Hz) on Ridgeback R100

slam_toolbox:
  ros__parameters:
    # Plugin/mode settings
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS parameters
    odom_frame: r100_0140/odom
    map_frame: map
    base_frame: r100_0140/base_link
    scan_topic: /r100_0140/sensors/lidar2d_0/scan
    use_map_saver: false
    mode: mapping                  # "mapping" or "localization"
    use_sim_time: false

    # Map parameters
    map_update_interval: 5.0       # Seconds between map publishes
    resolution: 0.05               # Map resolution in meters
    max_laser_range: 10.0          # Hokuyo UST-10LX max range (10m)
    minimum_time_interval: 0.5     # Minimum time between scans for SLAM processing
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000    # ~40MB

    # Loop closure
    enable_interactive_mode: false
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.3   # Minimum movement before adding new scan
    minimum_travel_heading: 0.15   # Minimum rotation before adding new scan (rad)
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0

    # Loop closure settings
    loop_search_space_dimension: 8.0
    loop_search_minimum_chain_size: 10
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Correlation params
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan matcher
    distance_penalty_gain: 0.35
    angle_penalty_gain: 0.4

    # Serialization
    serialize_map: false
    use_resp_topic: false
