# Safety Controller Parameters
# Tune these based on the robot's physical dimensions and environment

safety_controller:
  ros__parameters:
    # Ridgeback R100 is roughly 960×793mm — use 0.5m padding for danger zone
    danger_zone_m: 0.45        # Hard stop: obstacle closer than this → emergency stop
    warning_zone_m: 0.8        # Warning: obstacle in this range (shown in UI)
    lidar_timeout_s: 4.0       # Seconds without LiDAR data before emergency stop
    front_cone_deg: 60.0       # Check ±60° ahead for forward-motion stops
    status_rate_hz: 5.0

    lidar_topic: /r100_0140/sensors/lidar2d_0/scan
    odom_topic: /r100_0140/platform/odom/filtered
    cmd_vel_override_topic: /safety/cmd_vel_override
    status_topic: /safety/status

    # Soft bumper — per-axis directional block
    chassis_half_x_m: 0.48          # Robot half-length (front/rear from LiDAR)
    chassis_half_y_m: 0.40          # Robot half-width  (left/right from LiDAR)
    axis_block_enter_m: 0.20        # Block axis when obstacle < 0.20m from body edge
    axis_block_exit_m: 0.25         # Release axis when obstacle > 0.25m from body edge
    axis_block_release_scans: 3     # Consecutive clear scans before releasing block
    rotation_corner_margin_m: 0.20  # Corner clearance required to allow rotation
    rear_blind_default_block: true  # Block reverse (-x) by default (no rear LiDAR)
    min_valid_range_m: 0.05         # Drop LiDAR returns below this distance

cmd_vel_mux:
  ros__parameters:
    output_topic: /r100_0140/cmd_vel
    safety_timeout_s: 0.2           # Safety override holds for 0.2s after last trigger
    nav2_timeout_s: 0.5             # Nav2 source times out if no new cmd for 0.5s
    teleop_timeout_s: 0.5           # Teleop source window (motion_server publishes at 10Hz)
    publish_rate_hz: 20.0
    apply_axis_mask: true           # Enable per-axis soft bumper masking
    axis_mask_status_timeout_s: 1.0 # Fail-safe: block all if /safety/status stale
    require_safety_status: true

motion_server:
  ros__parameters:
    output_topic: /cmd_vel_teleop
    publish_rate_hz: 10.0
    watchdog_s: 5.0                 # Stop if no command received for 5s
