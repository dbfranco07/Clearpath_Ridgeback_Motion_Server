mission_orchestrator:
  ros__parameters:
    command_topic: /ridgeback/mission/command
    status_topic: /ridgeback/mission/status
    detections_topic: /ridgeback/semantic/room_detections
    exploration_command_topic: /ridgeback/exploration/command
    safety_status_topic: /ridgeback/safety/status
    odom_topic: /r100_0140/platform/odom/filtered
    stop_topic: /cmd_vel_nav
    navigate_action: navigate_to_pose
    map_frame: map
    base_frame: base_link
    room_min_confidence: 0.55
    start_tolerance_m: 0.45

room_detector:
  ros__parameters:
    image_topic: /r100_0140/image/compressed
    fallback_image_topic: /r100_0140/sensors/camera_0/color/compressed
    odom_topic: /r100_0140/platform/odom/filtered
    mission_status_topic: /ridgeback/mission/status
    detections_topic: /ridgeback/semantic/room_detections
    vlm_status_topic: /ridgeback/vlm/status
    map_frame: map
    base_frame: base_link
    detect_period_s: 7.0
    min_confidence: 0.55
    max_tokens: 240
    max_image_long_side: 960
    vlm_jpeg_quality: 70
    min_vlm_travel_m: 0.75
    min_vlm_rotation_deg: 25.0

frontier_explorer:
  ros__parameters:
    map_topic: /map
    odom_topic: /r100_0140/platform/odom/filtered
    command_topic: /ridgeback/exploration/command
    status_topic: /ridgeback/exploration/status
    navigate_action: navigate_to_pose
    map_frame: map
    base_frame: base_link
    min_frontier_size_cells: 8
    occupied_inflation_cells: 8
    goal_check_period_s: 2.0
    goal_reached_pause_s: 1.0
    selection_mode: vlm
    vlm_top_n: 4
    vlm_call_timeout_s: 2.0
    vlm_min_replan_interval_s: 4.0
    vlm_max_image_age_s: 2.0
    image_topic: /r100_0140/image/compressed
    fallback_image_topic: /r100_0140/sensors/camera_0/color/compressed

safety_controller:
  ros__parameters:
    lidar_topic: /r100_0140/sensors/lidar2d_0/scan
    odom_topic: /r100_0140/platform/odom/filtered
    emergency_stop_topic: /r100_0140/platform/emergency_stop
    mission_status_topic: /ridgeback/mission/status
    vlm_status_topic: /ridgeback/vlm/status
    operator_heartbeat_topic: /pc_heartbeat
    safety_cmd_topic: /cmd_vel_safety
    status_topic: /ridgeback/safety/status
    warning_distance_m: 0.80
    danger_distance_m: 0.45
    danger_release_distance_m: 0.60
    lidar_timeout_s: 1.0
    odom_timeout_s: 1.0
    vlm_timeout_s: 8.0
    operator_heartbeat_timeout_s: 4.0
    require_operator_heartbeat: true
    stop_hold_s: 1.0
    check_vlm_network: true
    vlm_check_period_s: 5.0
    vlm_http_timeout_s: 1.5

cmd_vel_mux:
  ros__parameters:
    safety_topic: /cmd_vel_safety
    nav_topic: /cmd_vel_nav
    teleop_topic: /cmd_vel_teleop
    output_topic: /r100_0140/cmd_vel
    safety_status_topic: /ridgeback/safety/status
    status_topic: /ridgeback/cmd_vel_mux/status
    nav_timeout_s: 0.75
    teleop_timeout_s: 0.75
    safety_timeout_s: 0.50
    max_linear_mps: 0.45
    max_lateral_mps: 0.35
    max_angular_rps: 0.80
    publish_hz: 20.0

ridgeback_dashboard:
  ros__parameters:
    host: 0.0.0.0
    port: 8081
    image_topic: /r100_0140/image/compressed
    raw_image_topic: ""
    depth_compressed_topic: /r100_0140/image/depth_compressed
    depth_topic: ""
    fallback_compressed_image_topic: /r100_0140/sensors/camera_0/color/compressed
    fallback_raw_image_topic: /r100_0140/sensors/camera_0/color/image
    fallback_depth_topic: /r100_0140/sensors/camera_0/depth/image
    enable_depth_feed: true
    depth_render_hz: 4.0
    map_render_hz: 1.0
    map_target_long_side: 1000
    odom_topic: /r100_0140/platform/odom/filtered
    lidar_topic: /r100_0140/sensors/lidar2d_0/scan
    battery_topic: /r100_0140/platform/bms/state
    map_topic: /map
    cmd_vel_topic: /cmd_vel_teleop
    mission_command_topic: /ridgeback/mission/command
    exploration_command_topic: /ridgeback/exploration/command
    operator_heartbeat_topic: /pc_heartbeat
    mission_status_topic: /ridgeback/mission/status
    safety_status_topic: /ridgeback/safety/status
    vlm_status_topic: /ridgeback/vlm/status
    mux_status_topic: /ridgeback/cmd_vel_mux/status
    teleop_linear_speed: 0.28
    teleop_lateral_speed: 0.28
    teleop_angular_speed: 0.85
    teleop_command_max_age_s: 1.50
